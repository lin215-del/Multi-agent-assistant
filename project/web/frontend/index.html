<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>学生问答助手 · 控制台</title>
<style>
  /* ============================================================
     设计令牌 —— 深蓝灰仪表盘风
     ============================================================ */
  :root {
    --sidebar-bg: #0f172a;      /* 侧栏深藏蓝 */
    --sidebar-bg-2: #1e293b;    /* 侧栏 hover / 分隔 */
    --sidebar-fg: #cbd5e1;      /* 侧栏文字 */
    --sidebar-fg-dim: #64748b;  /* 侧栏次要文字 */
    --brand: #2563eb;           /* 品牌深蓝 */
    --brand-dark: #1d4ed8;
    --brand-soft: #eff6ff;      /* 品牌浅底 */
    --content-bg: #f1f5f9;      /* 内容区背景 */
    --card-bg: #ffffff;
    --text: #0f172a;
    --text-dim: #475569;
    --text-mute: #94a3b8;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 10px 25px rgba(15,23,42,.10);
    --radius: 10px;

    /* 语义色 */
    --ok: #16a34a;
    --no: #dc2626;
    --warn-bg: #fffbeb;
    --warn-bd: #fcd34d;
    --warn-fg: #92400e;
    --reject-bg: #fef2f2;
    --reject-bd: #fca5a5;
    --reject-fg: #b91c1c;
    --info-bg: #eff6ff;
    --info-bd: #bfdbfe;
    --info-fg: #1e40af;

    /* 徽章 */
    --badge-table-bg: #dbeafe; --badge-table-fg: #1e40af;
    --badge-figure-bg: #ede9fe; --badge-figure-fg: #6d28d9;
    --badge-text-bg: #f1f5f9; --badge-text-fg: #475569;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--content-bg); }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: var(--content-bg);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--brand); text-decoration: none; }
  kbd {
    background: #e2e8f0; border-radius: 4px; padding: 1px 6px;
    font-family: inherit; font-size: 12px; color: #334155; border: 1px solid #cbd5e1;
  }

  /* ============================================================
     布局：侧栏 + 内容区
     ============================================================ */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--sidebar-bg);
    color: var(--sidebar-fg);
    display: flex; flex-direction: column;
    position: fixed; top: 0; bottom: 0; left: 0;
    z-index: 20;
  }
  .brand {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--sidebar-bg-2);
    display: flex; align-items: center; gap: 11px;
  }
  .brand-logo {
    width: 38px; height: 38px; border-radius: 9px;
    background: linear-gradient(135deg, var(--brand), #3b82f6);
    display: grid; place-items: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(37,99,235,.35);
  }
  .brand-title { font-size: 15px; font-weight: 700; color: #f8fafc; letter-spacing: .3px; }
  .brand-sub { font-size: 11px; color: var(--sidebar-fg-dim); margin-top: 1px; }

  .nav { padding: 14px 12px; flex: 1; }
  .nav-label {
    font-size: 11px; color: var(--sidebar-fg-dim); text-transform: uppercase;
    letter-spacing: 1px; padding: 6px 12px 8px; font-weight: 600;
  }
  .nav a {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
    color: var(--sidebar-fg); font-size: 14px; font-weight: 500;
    transition: background .15s, color .15s;
  }
  .nav a .nav-ico { font-size: 17px; width: 20px; text-align: center; }
  .nav a:hover { background: var(--sidebar-bg-2); color: #f1f5f9; }
  .nav a.active {
    background: var(--brand); color: #fff;
    box-shadow: 0 3px 8px rgba(37,99,235,.4);
  }
  .sidebar-foot {
    padding: 14px 20px; border-top: 1px solid var(--sidebar-bg-2);
    font-size: 12px; color: var(--sidebar-fg-dim);
  }
  .sidebar-foot b { color: var(--sidebar-fg); font-weight: 600; }

  .main {
    margin-left: 220px; flex: 1;
    display: flex; flex-direction: column; min-width: 0;
  }
  .topbar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    position: sticky; top: 0; z-index: 10;
  }
  .crumb { font-size: 12px; color: var(--text-mute); margin-bottom: 3px; }
  .crumb b { color: var(--text-dim); font-weight: 500; }
  .page-title { font-size: 20px; font-weight: 700; color: var(--text); margin: 0; }

  .content { padding: 28px 32px 60px; flex: 1; }
  .content-inner { max-width: 940px; margin: 0 auto; }

  /* 全局横幅 */
  .global-banner {
    max-width: 940px; margin: 0 auto 18px;
    padding: 11px 16px; border-radius: 8px; font-size: 13.5px;
    background: var(--info-bg); color: var(--info-fg); border: 1px solid var(--info-bd);
  }
  .global-banner.error {
    background: var(--reject-bg); color: var(--reject-fg); border-color: var(--reject-bd);
  }
  [hidden] { display: none !important; }

  /* ============================================================
     问答页
     ============================================================ */
  .ask-box {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; margin-bottom: 18px;
  }
  .ask-row { display: flex; gap: 10px; }
  .ask-input {
    flex: 1; padding: 13px 16px; font-size: 15px;
    border: 1.5px solid var(--border); border-radius: 9px;
    outline: none; transition: border-color .15s, box-shadow .15s;
    font-family: inherit; color: var(--text); background: #f8fafc;
  }
  .ask-input:focus {
    border-color: var(--brand); background: #fff;
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }
  .btn {
    padding: 0 26px; min-width: 96px;
    background: var(--brand); color: #fff; border: none;
    border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s, transform .05s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .65; cursor: not-allowed; }
  .btn-ghost {
    background: var(--brand-soft); color: var(--brand);
    min-width: auto; padding: 7px 15px; font-size: 13px; font-weight: 600;
  }
  .btn-ghost:hover { background: #dbeafe; }
  .hint { margin-top: 11px; font-size: 12.5px; color: var(--text-mute); }

  .chips-row { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 14px; }
  .chip {
    padding: 7px 15px; background: #f1f5f9; border: 1px solid var(--border);
    border-radius: 999px; font-size: 13px; color: var(--text-dim);
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .chip:hover { background: var(--brand-soft); border-color: #bfdbfe; color: var(--brand); }

  /* 答案区 */
  .answer-block { margin-top: 4px; }
  .qa-q {
    background: #f1f5f9; border-radius: 9px; padding: 12px 16px;
    margin-bottom: 12px; font-size: 14.5px; color: var(--text-dim);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .qa-q .q-tag {
    background: var(--brand); color: #fff; font-size: 12px; font-weight: 700;
    border-radius: 5px; padding: 1px 8px; flex-shrink: 0; margin-top: 2px;
  }
  .qa-a {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px 20px; font-size: 15px; color: var(--text);
    white-space: pre-wrap; word-break: break-word; margin-bottom: 14px;
  }
  .qa-a.reject { border-color: var(--reject-bd); background: var(--reject-bg); }
  .reject-tag {
    display: inline-block; background: var(--no); color: #fff;
    font-size: 12px; font-weight: 700; border-radius: 5px;
    padding: 2px 10px; margin-bottom: 10px;
  }

  /* 工具卡片 */
  .tool-box {
    background: var(--info-bg); border: 1px solid var(--info-bd);
    border-radius: 9px; padding: 14px 16px; margin-bottom: 14px;
    font-size: 14px; color: var(--info-fg);
  }
  .tool-box .tool-title { font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
  .tool-box pre {
    margin: 0; font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 13.5px; white-space: pre-wrap; word-break: break-word;
  }

  /* 反思重试提示 */
  .retry-note {
    background: var(--warn-bg); border: 1px solid var(--warn-bd);
    border-radius: 9px; padding: 11px 15px; margin-bottom: 14px;
    font-size: 13.5px; color: var(--warn-fg);
    display: flex; align-items: center; gap: 8px;
  }

  /* 折叠面板 */
  .fold {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 14px; overflow: hidden;
  }
  .fold > summary {
    padding: 13px 18px; cursor: pointer; font-size: 14px; font-weight: 600;
    color: var(--text-dim); list-style: none; user-select: none;
    display: flex; align-items: center; justify-content: space-between;
    transition: background .15s;
  }
  .fold > summary:hover { background: #f8fafc; }
  .fold > summary::-webkit-details-marker { display: none; }
  .fold > summary::after {
    content: "▾"; color: var(--text-mute); font-size: 13px; transition: transform .2s;
  }
  .fold[open] > summary::after { transform: rotate(180deg); }
  .fold[open] > summary { border-bottom: 1px solid var(--border); }

  /* 引用 match */
  .matches { padding: 6px 12px 12px; }
  .match {
    border: 1px solid var(--border); border-radius: 8px;
    margin-top: 10px; overflow: hidden; background: #fff;
  }
  .match-head {
    display: flex; align-items: center; gap: 10px; padding: 11px 14px;
    cursor: pointer; transition: background .15s; flex-wrap: wrap;
  }
  .match-head:hover { background: #f8fafc; }
  .match-source { font-size: 13.5px; font-weight: 600; color: var(--text); }
  .match-score { font-size: 12.5px; color: var(--text-mute); }
  .match-toggle { margin-left: auto; font-size: 12.5px; color: var(--brand); font-weight: 600; }
  .match-body {
    max-height: 0; overflow: hidden; transition: max-height .25s ease; background: #f8fafc;
  }
  .match.open .match-body { max-height: 500px; }
  .match-content {
    margin: 0; padding: 12px 14px; font-size: 13px; color: var(--text-dim);
    white-space: pre-wrap; word-break: break-word;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    border-top: 1px solid var(--border);
  }

  /* 徽章 */
  .badge {
    display: inline-block; font-size: 11.5px; font-weight: 700;
    border-radius: 5px; padding: 2px 9px; flex-shrink: 0;
  }
  .badge-table { background: var(--badge-table-bg); color: var(--badge-table-fg); }
  .badge-figure { background: var(--badge-figure-bg); color: var(--badge-figure-fg); }
  .badge-text { background: var(--badge-text-bg); color: var(--badge-text-fg); }

  /* trace */
  .trace { padding: 6px 18px 16px; }
  .trace-line {
    display: flex; flex-wrap: wrap; gap: 18px; font-size: 13px;
    color: var(--text-dim); padding: 5px 0;
  }
  .trace-line b { color: var(--text); font-weight: 600; }
  .trace-line .ok { color: var(--ok); font-weight: 600; }
  .trace-line .no { color: var(--no); font-weight: 600; }
  .trace-draft {
    margin-top: 8px; padding: 12px 14px; border: 1px dashed #cbd5e1;
    border-radius: 8px; background: #f8fafc; font-size: 13px;
    color: var(--text-dim); white-space: pre-wrap; word-break: break-word;
  }

  /* ============================================================
     服务卡片页
     ============================================================ */
  .section-title {
    font-size: 16px; font-weight: 700; color: var(--text);
    margin: 26px 0 14px; display: flex; align-items: center; gap: 9px;
  }
  .section-title:first-child { margin-top: 0; }
  .section-title .count {
    font-size: 12.5px; font-weight: 600; color: var(--brand);
    background: var(--brand-soft); border-radius: 999px; padding: 2px 11px;
  }
  .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px; display: flex; flex-direction: column;
    transition: transform .18s, box-shadow .18s, border-color .18s;
  }
  .card:hover {
    transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: #bfdbfe;
  }
  .card h4 {
    margin: 0 0 8px; font-size: 15px; font-weight: 700;
    color: var(--text); line-height: 1.45;
  }
  .card p {
    margin: 0 0 16px; font-size: 13px; color: var(--text-dim);
    flex: 1; line-height: 1.6;
  }
  .card-foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-top: auto;
  }
  .card-id { font-size: 11.5px; color: var(--text-mute); font-family: ui-monospace, monospace; }

  /* ============================================================
     历史页
     ============================================================ */
  .history-item {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 12px; overflow: hidden;
  }
  .history-head { padding: 15px 18px; cursor: pointer; transition: background .15s; }
  .history-head:hover { background: #f8fafc; }
  .history-top { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; }
  .history-id { font-size: 12.5px; font-weight: 700; color: var(--brand); font-family: ui-monospace, monospace; }
  .history-time { font-size: 12.5px; color: var(--text-mute); }
  .history-top .chev { margin-left: auto; color: var(--text-mute); font-size: 13px; transition: transform .2s; }
  .history-item.open .chev { transform: rotate(180deg); }
  .history-q { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  .history-meta { display: flex; align-items: center; gap: 14px; font-size: 12.5px; color: var(--text-mute); flex-wrap: wrap; }
  .pill { background: #dbeafe; color: #1e40af; border-radius: 999px; padding: 2px 11px; font-size: 12px; font-weight: 600; }
  .pill.reject { background: var(--reject-bg); color: var(--reject-fg); }
  .history-preview { font-size: 13px; color: var(--text-dim); margin-top: 8px; line-height: 1.55; }
  .history-body {
    max-height: 0; overflow: hidden; transition: max-height .3s ease;
    padding: 0 18px; background: #f8fafc;
  }
  .history-item.open .history-body {
    max-height: 2000px; padding: 16px 18px; border-top: 1px solid var(--border);
  }
  .history-body .fold, .history-body .qa-a { box-shadow: none; }

  /* ============================================================
     状态：加载 / 空 / spinner
     ============================================================ */
  .loading {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 50px 20px; color: var(--text-mute); font-size: 14px;
  }
  .spinner {
    width: 18px; height: 18px; border: 2.5px solid #cbd5e1;
    border-top-color: var(--brand); border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block;
  }
  .btn .spinner { border-color: rgba(255,255,255,.4); border-top-color: #fff; width: 15px; height: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .skeleton-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; height: 150px;
  }
  .sk-line {
    height: 12px; border-radius: 6px; margin-bottom: 12px;
    background: linear-gradient(90deg, #eef2f7 25%, #e2e8f0 37%, #eef2f7 63%);
    background-size: 400% 100%; animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-mute); }
  .empty .empty-ico { font-size: 44px; margin-bottom: 14px; opacity: .55; }
  .empty p { margin: 6px 0; font-size: 14px; }

  /* ---- 问答页欢迎面板（空状态增强）---- */
  .welcome { margin-top: 6px; }
  .welcome-head {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px; margin-bottom: 18px;
    background: linear-gradient(135deg, #eff4ff, #f7faff);
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .welcome-head .wh-ico {
    flex: none; width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; background: var(--brand); color: #fff;
  }
  .welcome-head h3 { margin: 0 0 2px; font-size: 15px; color: var(--text); }
  .welcome-head p { margin: 0; font-size: 13px; color: var(--text-mute); }

  .welcome-grid {
    display: grid; grid-template-columns: 1.15fr 1fr; gap: 18px;
  }
  .panel {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .panel-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 12px;
  }
  .panel-title .pt-badge {
    font-size: 11px; font-weight: 600; color: var(--brand);
    background: #eef4ff; border-radius: 20px; padding: 1px 8px;
  }
  .hot-list { display: flex; flex-direction: column; gap: 8px; }
  .hot-item {
    display: flex; align-items: center; gap: 10px; width: 100%;
    text-align: left; cursor: pointer;
    background: #f8fafc; border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    font-size: 13px; color: var(--text);
    transition: background .15s, border-color .15s, transform .15s;
  }
  .hot-item:hover { background: #eef4ff; border-color: var(--brand); transform: translateX(2px); }
  .hot-item .hi-rank {
    flex: none; width: 20px; height: 20px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; background: var(--brand);
  }
  .hot-item:nth-child(n+4) .hi-rank { background: #94a3b8; }
  .hot-item .hi-text { flex: 1; }
  .hot-item .hi-go { color: var(--text-mute); font-size: 14px; }
  .cap-list { display: flex; flex-direction: column; gap: 10px; }
  .cap-item { display: flex; gap: 10px; align-items: flex-start; }
  .cap-item .ci-ico {
    flex: none; width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
    background: #eef4ff;
  }
  .cap-item .ci-t { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1px; }
  .cap-item .ci-d { font-size: 12px; color: var(--text-mute); line-height: 1.5; }
  @media (max-width: 820px) { .welcome-grid { grid-template-columns: 1fr; } }

  /* ============================================================
     认证：登录 / 注册页（左右分栏）
     ============================================================ */
  .auth-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(1200px 600px at 15% -10%, #e0ecff 0%, transparent 55%),
      radial-gradient(900px 500px at 110% 120%, #dbeafe 0%, transparent 50%),
      var(--content-bg);
  }
  .auth-card {
    width: 100%; max-width: 860px;
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: 0 24px 60px rgba(15,23,42,.16);
    overflow: hidden;
  }

  /* 左侧品牌展示区 */
  .auth-hero {
    position: relative; padding: 40px 36px;
    background:
      radial-gradient(600px 260px at 90% 0%, rgba(59,130,246,.35) 0%, transparent 60%),
      linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0; display: flex; flex-direction: column;
  }
  .auth-hero-logo {
    display: flex; align-items: center; gap: 11px; margin-bottom: 30px;
  }
  .auth-hero-logo .hl-ico {
    width: 40px; height: 40px; border-radius: 10px; flex: none;
    display: grid; place-items: center; font-size: 21px;
    background: linear-gradient(135deg, var(--brand), #3b82f6);
    box-shadow: 0 6px 16px rgba(37,99,235,.45);
  }
  .auth-hero-logo b { font-size: 15px; color: #f8fafc; letter-spacing: .3px; }
  .auth-hero h2 {
    margin: 0 0 10px; font-size: 24px; line-height: 1.35; color: #f8fafc; font-weight: 700;
  }
  .auth-hero .hero-sub { margin: 0 0 26px; font-size: 13.5px; color: #94a3b8; line-height: 1.7; }
  .hero-feats { display: flex; flex-direction: column; gap: 14px; margin-top: auto; }
  .hero-feat { display: flex; gap: 11px; align-items: flex-start; }
  .hero-feat .hf-ico {
    width: 30px; height: 30px; border-radius: 8px; flex: none;

<body>
  <!-- 认证页（登录 / 注册）容器：无侧栏全屏居中 -->
  <div id="auth-view" hidden></div>

          <div id="view"></div>

<script>
"use strict";

/* ============================================================
   API 配置（同源 FastAPI 用相对路径；本地开发指向 8090）
   ============================================================ */
var API_BASE = (function () {
  var host = location.hostname, port = location.port;
  if (port === "8090" || port === "8000" || port === "") return "";
  if (host === "localhost" || host === "127.0.0.1") return "http://localhost:" + (port || "8000");
  return "";
})();
var DEMO = false;

/* ---------- 认证状态（localStorage） ---------- */
var AUTH_KEY = "sqa_auth";
function getAuth() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY)) || {}; }
  catch (e) { return {}; }
}
function setAuth(obj) { localStorage.setItem(AUTH_KEY, JSON.stringify(obj || {})); }
function clearAuth() { localStorage.removeItem(AUTH_KEY); }
function authHeaders(base) {
  var h = base || {};
  var t = getAuth().token;
  if (t) h.Authorization = "Bearer " + t;
  return h;
}

async function apiGet(path) {
  var res = await fetch(API_BASE + path, {
    headers: authHeaders({ Accept: "application/json" }),
  });
  if (!res.ok) { var e = new Error("HTTP " + res.status); e.status = res.status; throw e; }
  return res.json();
}
async function apiPost(path, body) {
  var res = await fetch(API_BASE + path, {
    method: "POST",
    headers: authHeaders({ "Content-Type": "application/json", Accept: "application/json" }),
    body: JSON.stringify(body),
  });
  var data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    var err = new Error((data && data.detail) || "HTTP " + res.status);
    err.status = res.status; err.detail = data && data.detail; throw err;
  }
  return data;
}

/* ---------- 工具 ---------- */
function $(sel, root) { return (root || document).querySelector(sel); }
function el(tag, cls, text) {
  var n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}
function escapeHTML(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function fmtLatency(ms) { return ms == null ? "-" : (ms / 1000).toFixed(1) + "s"; }
function fmtTime(s) {
  if (!s) return "";
  var d = new Date(s);
  if (isNaN(d.getTime())) return String(s);
  var p = function (n) { return String(n).padStart(2, "0"); };
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) +
    " " + p(d.getHours()) + ":" + p(d.getMinutes());
}
var BADGE = {
  table: { text: "表格", cls: "badge-table" },
  figure: { text: "图", cls: "badge-figure" },
  text: { text: "正文", cls: "badge-text" },
};
function badgeFor(type) {
  var b = BADGE[type] || BADGE.text;
  return '<span class="badge ' + b.cls + '">' + b.text + "</span>";
}
function showBanner(msg, isError) {
  var b = document.getElementById("global-banner");
  b.textContent = msg;
  b.className = "global-banner" + (isError ? " error" : "");
  b.hidden = false;
}
function hideBanner() { document.getElementById("global-banner").hidden = true; }

/* ============================================================
   路由
   ============================================================ */
var TITLES = { chat: "智能问答", cards: "服务卡片", history: "历史记录", documents: "文档管理" };
var AUTH_PAGES = { login: true, register: true };

function parseHash() {
  var raw = location.hash || "#/chat";
  raw = raw.replace(/^#!?\/?/, "");
  var qi = raw.indexOf("?");
  var pathPart = qi >= 0 ? raw.slice(0, qi) : raw;
  var queryPart = qi >= 0 ? raw.slice(qi + 1) : "";
  var path = pathPart.split("/")[0] || "chat";
  return { path: path, params: new URLSearchParams(queryPart) };
}
function setActiveNav(path) {
  document.querySelectorAll(".nav a").forEach(function (a) {
    a.classList.toggle("active", a.getAttribute("data-nav") === path);
  });
  var t = TITLES[path] || "智能问答";
  document.getElementById("page-title").textContent = t;
  document.getElementById("crumb-page").textContent = t;
}
function showChrome(showApp) {
  document.getElementById("app-layout").hidden = !showApp;
  document.getElementById("auth-view").hidden = showApp;
}
function renderSidebarUser(auth) {
  var area = document.getElementById("user-area");
  area.innerHTML = "";
  var isAdmin = auth.role === "admin";
  var name = auth.username || "用户";

  var avatar = el("div", "user-avatar", name.slice(0, 1).toUpperCase());
  var info = el("div", "user-info");
  var uname = el("div", "user-name", name);
  var tag = el("span", "role-tag " + (isAdmin ? "admin" : "user"), isAdmin ? "管理员" : "用户");
  info.appendChild(uname); info.appendChild(tag);
  var logout = el("button", "logout-btn", "退出");
  logout.type = "button";
  logout.addEventListener("click", function () { clearAuth(); location.hash = "#/login"; });

  area.appendChild(avatar); area.appendChild(info); area.appendChild(logout);

  // 管理员才显示文档管理入口
  document.getElementById("nav-documents").hidden = !isAdmin;
}

async function router() {
  var r = parseHash();
  var auth = getAuth();

  // 认证页：已登录则跳回问答
  if (AUTH_PAGES[r.path]) {
    if (auth.token) { location.hash = "#/chat"; return; }
    showChrome(false);
    var av = document.getElementById("auth-view");
    av.innerHTML = "";
    window.scrollTo(0, 0);
    return r.path === "register" ? renderRegister(av) : renderLogin(av);
  }

  // 受保护页：未登录则跳登录
  if (!auth.token) { location.hash = "#/login"; return; }

  showChrome(true);
  if (!TITLES[r.path]) r.path = "chat";
  if (r.path === "documents" && auth.role !== "admin") r.path = "chat";
  renderSidebarUser(auth);
  setActiveNav(r.path);
  var view = document.getElementById("view");
  view.innerHTML = "";
  window.scrollTo(0, 0);
  if (r.path === "cards") return renderCards(view);
  if (r.path === "history") return renderHistory(view);
  if (r.path === "documents") return renderDocuments(view);
  return renderChat(view, r.params);
}
window.addEventListener("hashchange", router);
window.addEventListener("DOMContentLoaded", function () {
  if (!location.hash) location.hash = "#/chat";
  router();
});

/* ============================================================
   认证页：登录 / 注册
   ============================================================ */
function authField(labelText, type, id, placeholder) {
  var wrap = el("div", "auth-field");
  var label = el("label", null, labelText);
  label.setAttribute("for", id);
  var input = el("input", "auth-input");
  input.type = type; input.id = id; input.placeholder = placeholder || "";
  input.autocomplete = type === "password" ? "current-password" : "username";
  wrap.appendChild(label); wrap.appendChild(input);
  return { wrap: wrap, input: input };
}
function authBrand(title, sub) {
  var brand = el("div", "auth-brand");
  var h1 = el("h1", null, title);
  brand.appendChild(h1);
  if (sub) brand.appendChild(el("p", null, sub));
  return brand;
}
function authHero() {
  var hero = el("div", "auth-hero");

  var logo = el("div", "auth-hero-logo");
  var ico = el("div", "hl-ico", "🎓"); ico.setAttribute("aria-hidden", "true");
  var name = el("b", null, "学生问答助手");
  logo.appendChild(ico); logo.appendChild(name);
  hero.appendChild(logo);

  var h2 = el("h2", null, "智能校园事务，一问即答");
  var sub = el("p", "hero-sub", "基于检索增强与反思机制，为你解答课程、GPA、奖学金、转专业等各类学生事务问题。");
  hero.appendChild(h2); hero.appendChild(sub);

  var feats = el("div", "hero-feats");
  [["🔍", "精准检索", "从知识库中定位最相关的政策与规定"],
   ["🧠", "反思重写", "自动校验答案质量，必要时重新作答"],
   ["📌", "引用可溯", "每条回答附带来源，答案有据可查"]].forEach(function (f) {
    var it = el("div", "hero-feat");
    var fi = el("div", "hf-ico", f[0]); fi.setAttribute("aria-hidden", "true");
    var tx = el("div");
    tx.appendChild(el("div", "hf-t", f[1]));
    tx.appendChild(el("div", "hf-d", f[2]));
    it.appendChild(fi); it.appendChild(tx);
    feats.appendChild(it);
  });
  hero.appendChild(feats);
  return hero;
}

function renderLogin(view) {
  var wrap = el("div", "auth-wrap");
  var card = el("div", "auth-card");
  card.appendChild(authHero());
  var formSide = el("div", "auth-form");
  formSide.appendChild(authBrand("欢迎回来", "登录以继续使用控制台"));

  var errBox = el("div", "auth-error"); errBox.hidden = true;
  formSide.appendChild(errBox);

  var uname = authField("用户名", "text", "login-username", "请输入用户名");
  var pwd = authField("密码", "password", "login-password", "请输入密码");
  formSide.appendChild(uname.wrap); formSide.appendChild(pwd.wrap);

  var btn = el("button", "btn auth-btn", "登录"); btn.type = "button";
  formSide.appendChild(btn);

  var alt = el("div", "auth-alt");
  alt.appendChild(document.createTextNode("还没有账号？"));
  var reg = el("a", null, "立即注册"); reg.href = "#/register";
  alt.appendChild(reg);
  formSide.appendChild(alt);

  function showErr(msg) { errBox.textContent = msg; errBox.hidden = false; }

  async function submit() {
    var u = uname.input.value.trim(), p = pwd.input.value;
    if (!u || !p) { showErr("请输入用户名和密码"); return; }
    errBox.hidden = true;
    btn.disabled = true; btn.textContent = "登录中…";
    try {
      var data = await apiPost("/api/login", { username: u, password: p });
      setAuth({ token: data.token, role: data.role, username: data.username || u });
      location.hash = "#/chat";
    } catch (err) {
      if (err.status == null || err.status === 404) {
        DEMO = true;
        setAuth({ token: "demo-token", role: u === "admin" ? "admin" : "user", username: u });
        location.hash = "#/chat"; return;
      }
      if (err.status === 401 || err.status === 400) showErr(err.detail || "用户名或密码错误");
      else showErr("登录失败：" + (err.detail || err.message || "请稍后再试"));
      btn.disabled = false; btn.textContent = "登录";
    }
  }
  btn.addEventListener("click", submit);
  [uname.input, pwd.input].forEach(function (i) {
    i.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) submit();
    });
  });

  formSide.appendChild(el("div", "auth-note", "管理员与普通用户使用同一登录入口"));
  card.appendChild(formSide);
  wrap.appendChild(card); view.appendChild(wrap);
  uname.input.focus();
}

function renderRegister(view) {
  var wrap = el("div", "auth-wrap");
  var card = el("div", "auth-card");
  card.appendChild(authHero());
  var formSide = el("div", "auth-form");
  formSide.appendChild(authBrand("加入我们", "创建一个新账号"));

  var errBox = el("div", "auth-error"); errBox.hidden = true;
  formSide.appendChild(errBox);

  var uname = authField("用户名", "text", "reg-username", "设置用户名");
  var pwd = authField("密码", "password", "reg-password", "设置密码");
  var pwd2 = authField("确认密码", "password", "reg-password2", "再次输入密码");
  pwd.input.autocomplete = "new-password"; pwd2.input.autocomplete = "new-password";
  formSide.appendChild(uname.wrap); formSide.appendChild(pwd.wrap); formSide.appendChild(pwd2.wrap);

  var btn = el("button", "btn auth-btn", "注册"); btn.type = "button";
  formSide.appendChild(btn);

  var alt = el("div", "auth-alt");
  alt.appendChild(document.createTextNode("已有账号？"));
  var login = el("a", null, "去登录"); login.href = "#/login";
  alt.appendChild(login);
  formSide.appendChild(alt);

  formSide.appendChild(el("div", "auth-note", "仅支持注册普通用户账号"));

  function showErr(msg) { errBox.textContent = msg; errBox.hidden = false; }

  async function submit() {
    var u = uname.input.value.trim(), p = pwd.input.value, p2 = pwd2.input.value;
    if (!u || !p) { showErr("请输入用户名和密码"); return; }
    if (p !== p2) { showErr("两次输入的密码不一致"); return; }
    errBox.hidden = true;
    btn.disabled = true; btn.textContent = "注册中…";
    try {
      var data = await apiPost("/api/register", { username: u, password: p });
      setAuth({ token: data.token, role: data.role || "user", username: data.username || u });
      location.hash = "#/chat";
    } catch (err) {
      if (err.status == null || err.status === 404) { // 后端不可达：演示兜底（注册即普通用户）
        DEMO = true;
        setAuth({ token: "demo-token", role: "user", username: u });
        location.hash = "#/chat"; return;
      }
      if (err.status === 409 || err.status === 400) showErr(err.detail || "该用户名已被注册");
      else showErr("注册失败：" + (err.detail || err.message || "请稍后再试"));
      btn.disabled = false; btn.textContent = "注册";
    }
  }
  btn.addEventListener("click", submit);
  [uname.input, pwd.input, pwd2.input].forEach(function (i) {
    i.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) submit();
    });
  });

  card.appendChild(formSide);
  wrap.appendChild(card); view.appendChild(wrap);
  uname.input.focus();
}

/* ============================================================
   页面：文档管理（仅管理员）
   ============================================================ */
function renderDocuments(view) {
  var wrap = el("div");
  var box = el("div", "ask-box");
  box.appendChild(el("div", "section-title", "📄 文档管理"));
  var p = el("p", "hint", "管理知识库文档，仅管理员可见。文档上传与索引功能由后端提供。");
  box.appendChild(p);
  wrap.appendChild(box);
  wrap.appendChild(emptyState("📄", ["暂无文档", "接入后端 /api/documents 后在此管理知识库"]));
  view.appendChild(wrap);
}

/* ============================================================
   页面 1：问答
   ============================================================ */
function renderChat(view, params) {
  var wrap = el("div");

  var box = el("div", "ask-box");
  var row = el("div", "ask-row");
  var input = el("input", "ask-input");
  input.type = "text";
  input.placeholder = "试试问：怎么选课 / 算 GPA / 国奖条件";
  input.setAttribute("aria-label", "输入你的问题");
  var btn = el("button", "btn");
  btn.type = "button"; btn.textContent = "发送";
  row.appendChild(input); row.appendChild(btn);
  box.appendChild(row);

  var chips = el("div", "chips-row");
  ["怎么选课", "帮我算下 GPA", "国奖申请条件", "怎么转专业"].forEach(function (q) {
    var c = el("button", "chip", q);
    c.type = "button";
    c.addEventListener("click", function () { input.value = q; input.focus(); });
    chips.appendChild(c);
  });
  box.appendChild(chips);

  var hint = el("div", "hint");
  hint.innerHTML = '点击发送或按 <kbd>Ctrl</kbd> + <kbd>Enter</kbd> 提交';
  box.appendChild(hint);
  wrap.appendChild(box);

  var answerArea = el("div"); answerArea.id = "answer-area";
  answerArea.appendChild(buildWelcome());
  wrap.appendChild(answerArea);
  view.appendChild(wrap);

  function buildWelcome() {
    var w = el("div", "welcome");

    var head = el("div", "welcome-head");
    var hi = el("div", "wh-ico"); hi.textContent = "🎓"; head.appendChild(hi);
    var htxt = el("div");
    var h3 = el("h3"); h3.textContent = "你好，我是暨大学生助手";

  var busy = false;

    var q = input.value.trim();

    answerArea.innerHTML = '<div class="loading"><span class="spinner"></span>正在检索并生成答案…</div>';
    try {
      var data = await apiPost("/api/chat", { question: q });
      hideBanner();
      answerArea.innerHTML = "";
      answerArea.appendChild(buildAnswer(q, data));
    } catch (err) {
      if (err.status === 422) {
        answerArea.innerHTML = "";
        answerArea.appendChild(emptyState("⚠️", [err.detail || "question 不能为空"]));
      } else {
        var demo = demoChat(q);
        DEMO = true;
        showBanner("演示模式：后端未连接（端口 8090），当前显示示例数据。", false);
        answerArea.innerHTML = "";
        answerArea.appendChild(buildAnswer(q, demo));
      }
    } finally {
      busy = false; btn.disabled = false; btn.textContent = "发送";
    }
  }

  input.addEventListener("keydown", function (e) {
    if (e.isComposing || e.keyCode === 229) return;
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); submit(); }
  });

  var preset = params && params.get("q");
  if (preset) { input.value = preset; submit(); }
  else { input.focus(); }
}

function buildAnswer(question, data) {
  var block = el("div", "answer-block");

  var qDiv = el("div", "qa-q");
  qDiv.innerHTML = '<span class="q-tag">Q</span><span>' + escapeHTML(question) + "</span>";
  block.appendChild(qDiv);

  if (data.round && data.round > 0) {
    var retry = el("div", "retry-note");
    retry.innerHTML = "⚠️ 第一次答案不满意，自动重写 <b style='margin:0 3px'>" + data.round + "</b> 次后交付";
    block.appendChild(retry);
  }

  var isReject = data.route === "reject";
  var aDiv = el("div", "qa-a" + (isReject ? " reject" : ""));
  if (isReject) {
    var tag = el("div"); tag.innerHTML = '<span class="reject-tag">⛔ 超出服务范围</span>';
    aDiv.appendChild(tag);
    aDiv.appendChild(document.createTextNode(data.answer || "该问题超出本助手的服务范围，暂无法回答。"));
  } else {
    aDiv.textContent = data.answer || "（无答案内容）";
  }
  block.appendChild(aDiv);

  if (data.tool_output) {
    var tool = el("div", "tool-box");
    var tt = el("div", "tool-title"); tt.innerHTML = "🧮 工具计算结果";
    var pre = el("pre"); pre.textContent = data.tool_output;
    tool.appendChild(tt); tool.appendChild(pre);
    block.appendChild(tool);
  }

  var matches = data.matches || [];
  if (matches.length) {
    var det = el("details", "fold"); det.open = true;
    var sum = el("summary"); sum.appendChild(document.createTextNode("引用来源（" + matches.length + " 条）"));
    det.appendChild(sum);
    var list = el("div", "matches");
    matches.forEach(function (m) { list.appendChild(buildMatch(m)); });
    det.appendChild(list);
    block.appendChild(det);
  }

  block.appendChild(buildTrace(data));
  return block;
}

function buildMatch(m) {
  var item = el("div", "match");
  var head = el("div", "match-head");
  var score = (m.score != null) ? "相似度 " + Number(m.score).toFixed(2) : "";
  head.innerHTML = badgeFor(m.type) +
    '<span class="match-source">' + escapeHTML(m.source || "未知来源") + "</span>" +
    '<span class="match-score">' + score + "</span>" +
    '<span class="match-toggle">展开</span>';
  var body = el("div", "match-body");
  var content = el("pre", "match-content");
  content.textContent = m.content || "（无内容）";
  body.appendChild(content);
  head.addEventListener("click", function () {
    var open = item.classList.toggle("open");
    $(".match-toggle", head).textContent = open ? "收起" : "展开";
  });
  item.appendChild(head); item.appendChild(body);
  return item;
}

function buildTrace(data) {
  var det = el("details", "fold");
  var sum = el("summary"); sum.appendChild(document.createTextNode("过程 trace（调试信息）"));
  det.appendChild(sum);
  var box = el("div", "trace");

  var line1 = el("div", "trace-line");
  line1.innerHTML =
    "<span><b>Route:</b> " + escapeHTML(data.route || "-") + "</span>" +
    "<span><b>Round:</b> " + (data.round != null ? data.round : "-") + "</span>" +
    "<span><b>Latency:</b> " + fmtLatency(data.latency_ms) + "</span>" +
    (data.history_id != null ? "<span><b>History:</b> #" + data.history_id + "</span>" : "");
  box.appendChild(line1);

  if (data.reflection) {
    var ok = data.reflection.ok;
    var line2 = el("div", "trace-line");
    line2.innerHTML = "<span><b>Reflection:</b> <span class='" + (ok ? "ok" : "no") + "'>" +
      (ok ? "✓ " : "✗ ") + escapeHTML(data.reflection.reason || (ok ? "通过" : "未通过")) + "</span></span>";
    box.appendChild(line2);
  }

  if (data.analysis) {
    var lbl = el("div", "trace-line"); lbl.innerHTML = "<b>草稿（反思重写前）：</b>";
    box.appendChild(lbl);
    var draft = el("div", "trace-draft"); draft.textContent = data.analysis;
    box.appendChild(draft);
  }
  det.appendChild(box);
  return det;
}

function emptyState(ico, lines) {
  var e = el("div", "empty");
  var i = el("div", "empty-ico"); i.textContent = ico; e.appendChild(i);
  (lines || []).forEach(function (t) { e.appendChild(el("p", null, t)); });
  return e;
}

function buildCard(c) {

function skeletonGrid() {

function buildHistoryItem(h) {
  var item = el("div", "history-item");
  var head = el("div", "history-head");

  var top = el("div", "history-top");
  top.innerHTML =
    '<span class="history-id">#' + (h.id != null ? h.id : "-") + "</span>" +
    '<span class="history-time">' + escapeHTML(fmtTime(h.created_at)) + "</span>" +
    '<span class="chev">▾</span>';
  head.appendChild(top);

  head.appendChild(el("div", "history-q", h.question || "(无问题)"));

  var ok = h.reflection ? h.reflection.ok : true;
  var meta = el("div", "history-meta");
  meta.innerHTML =
    '<span class="pill' + (h.route === "reject" ? " reject" : "") + '">' + escapeHTML(h.route || "-") + "</span>" +
    "<span>⏱ " + fmtLatency(h.latency_ms) + "</span>" +
    "<span>" + (ok ? "✓ 通过" : "✗ 未通过") + "</span>" +
    (h.round ? "<span>🔁 重写 " + h.round + " 次</span>" : "");
  head.appendChild(meta);

  var preview = (h.answer || "").slice(0, 90);
  head.appendChild(el("div", "history-preview", preview + ((h.answer || "").length > 90 ? "…" : "")));

  var body = el("div", "history-body");
  var full = el("div", "qa-a" + (h.route === "reject" ? " reject" : ""));
  full.textContent = h.answer || "";
  body.appendChild(full);

  if (h.tool_output) {
    var tool = el("div", "tool-box");
    var tt = el("div", "tool-title"); tt.innerHTML = "🧮 工具计算结果";
    var pre = el("pre"); pre.textContent = h.tool_output;
    tool.appendChild(tt); tool.appendChild(pre); body.appendChild(tool);
  }

  var matches = h.matches || [];
  if (matches.length) {
    var det = el("details", "fold");
    var sum = el("summary"); sum.appendChild(document.createTextNode("引用来源（" + matches.length + " 条）"));
    det.appendChild(sum);
    var mlist = el("div", "matches");
    matches.forEach(function (m) { mlist.appendChild(buildMatch(m)); });
    det.appendChild(mlist); body.appendChild(det);
  }
  body.appendChild(buildTrace(h));

  head.addEventListener("click", function () { item.classList.toggle("open"); });
  item.appendChild(head); item.appendChild(body);
  return item;
}
